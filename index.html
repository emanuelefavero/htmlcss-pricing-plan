<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML/CSS Pricing Plan</title>
    <meta
      name="description"
      content="A simple pricing plan page built with HTML and CSS"
    />
    <meta name="author" content="Emanuele Favero" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Favicon -->
    <link rel="icon" href="assets/img/logo.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <div class="heading">
          <h1>Our Pricing Plan</h1>
          <p>
            We are an industry-leading company that values honesty, integrity
            and efficiency, building quality products.
          </p>
        </div>
        <div class="switches">
          <button class="switch active">
            <span>Monthly</span>
            <i class="bi bi-toggle-on"></i>
          </button>
          <button class="switch">
            <span>Yearly</span>
            <i class="bi bi-toggle-off"></i>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
